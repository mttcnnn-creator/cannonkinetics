<!DOCTYPE html>
<html>
<head>
<title>Company | Cannon Kinetics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  width: 100%;
  overflow-x: hidden;
}

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Courier New", Courier, monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  box-sizing: border-box;
}

.container {
  width: 100%;
  max-width: 800px;
  padding: 50px 24px;
  line-height: 1.7;
  box-sizing: border-box;
}

.brand-line {
  font-size: 1.2em;
  font-weight: bold;
  letter-spacing: 3px;
  color: #fff;
}

.cursor {
  color: #ff0000;
  font-weight: bold;
  animation: blink 0.8s steps(1) infinite;
}

.body-text {
  opacity: 0;
  transition: opacity 0.6s ease;
}

.body-text.show {
  opacity: 1;
}

p {
  margin-bottom: 22px;
  color: #ccc;
  font-size: 1rem;
}

.tagline {
  margin-top: 45px;
  letter-spacing: 3px;
  color: #fff;
  line-height: 1.5;
  min-height: 3em;
}

.red {
  color: #ff0000;
}

@keyframes blink {
  50% {
    opacity: 0;
  }
}

@media (max-width: 700px) {
  body {
    align-items: flex-start;
  }

  .container {
    max-width: 100%;
    padding: 90px 22px 60px;
    line-height: 1.55;
  }

  .brand-line {
    font-size: 1em;
    letter-spacing: 1.5px;
  }

  p {
    font-size: 0.9rem;
    line-height: 1.55;
    margin-bottom: 20px;
  }

  .tagline {
    letter-spacing: 1.5px;
    font-size: 0.9em;
    margin-top: 34px;
    line-height: 1.45;
  }
}
</style>
</head>

<body>

<div class="container">

<p>
<span id="brand" class="brand-line"></span>
</p>

<div id="body" class="body-text">

<p>
We develop firearm components focused on modularity and integrated management of support gear and controls. Our designs are shaped by the demands of serious shooters, law enforcement, and military personnel in the field — where precision, control, and reliability are required.
</p>

<p class="tagline">
<span id="expect-line"></span><br>
<span id="demand-line"></span>
</p>

</div>

</div>

<script>
const brandText = "CANNON KINETICS";
const expectText = "EXPECT PRECISION.";
const demandText = "DEMAND CONTROL.";

const brandTarget = document.getElementById("brand");
const body = document.getElementById("body");
const expectTarget = document.getElementById("expect-line");
const demandTarget = document.getElementById("demand-line");

let brandIndex = 0;

// 25% faster than 130 → ~98ms
const speed = 98;

function typeBrand() {
  if (brandIndex <= brandText.length) {
    brandTarget.innerHTML = brandText.substring(0, brandIndex) + '<span class="cursor" id="brand-cursor">█</span>';
    brandIndex++;
    setTimeout(typeBrand, speed);
  } else {
    brandTarget.innerHTML = brandText + '<span class="cursor" id="brand-cursor">█</span>';

    setTimeout(function() {
      body.classList.add("show");
    }, 1000);

    setTimeout(startExpect, 10000);
    setTimeout(startDemand, 13000);
  }
}

function removeBrandCursor() {
  const cursor = document.getElementById("brand-cursor");
  if (cursor) cursor.remove();
}

function startExpect() {
  removeBrandCursor();

  let i = 0;

  function type() {
    if (i <= expectText.length) {
      const current = expectText.substring(0, i).replace("EXPECT", '<span class="red">EXPECT</span>');
      expectTarget.innerHTML = current + '<span class="cursor">█</span>';
      i++;
      setTimeout(type, speed);
    } else {
      expectTarget.innerHTML = expectText.replace("EXPECT", '<span class="red">EXPECT</span>');
    }
  }

  type();
}

function startDemand() {
  let i = 0;

  function type() {
    if (i <= demandText.length) {
      const current = demandText.substring(0, i).replace("DEMAND", '<span class="red">DEMAND</span>');
      demandTarget.innerHTML = current + '<span class="cursor">█</span>';
      i++;
      setTimeout(type, speed);
    } else {
      demandTarget.innerHTML = demandText.replace("DEMAND", '<span class="red">DEMAND</span>') + '<span class="cursor">█</span>';
    }
  }

  type();
}

window.onload = typeBrand;
</script>

</body>
</html>
