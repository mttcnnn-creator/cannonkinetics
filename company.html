<!DOCTYPE html>
<html>
<head>
<title>Company | Cannon Kinetics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Courier New", Courier, monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  max-width: 800px;
  padding: 50px 24px;
  line-height: 1.7;
}

.brand-line {
  font-size: 1.2em;
  font-weight: bold;
  letter-spacing: 3px;
  color: #fff;
}

.cursor {
  color: #fff;
  font-weight: bold;
  animation: blink 0.8s steps(1) infinite;
}

.body-text {
  margin-top: 20px;
}

p {
  margin-bottom: 22px;
  color: #ccc;
  font-size: 1rem;
}

.tagline {
  margin-top: 45px;
  letter-spacing: 3px;
  color: #fff;
  line-height: 1.5;
  min-height: 3em;
}

.red {
  color: #ff0000;
}

@keyframes blink {
  50% {
    opacity: 0;
  }
}

/* Mobile */
@media (max-width: 700px) {
  .container {
    padding: 40px 18px;
  }

  .brand-line {
    font-size: 1.05em;
    letter-spacing: 2px;
  }

  p {
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .tagline {
    letter-spacing: 2px;
    font-size: 0.95em;
    margin-top: 35px;
    line-height: 1.4;
  }
}
</style>
</head>

<body>

<div class="container">

<p>
<span id="brand" class="brand-line"></span>
</p>

<div class="body-text">
<p id="body-paragraph"></p>

<p class="tagline">
<span id="expect-line"></span><br>
<span id="demand-line"></span>
</p>
</div>

</div>

<script>
const brandText = "CANNON KINETICS";
const bodyText = "develops firearms components focused on cross-compatibility, modularity, and integrated control of mission-critical systems for modern weapon platforms. Our innovations are driven by the demands of serious shooters, law enforcement, and military operators in the field, where precision, control, and rugged reliability are non-negotiable.";

const expectText = "EXPECT PRECISION.";
const demandText = "DEMAND CONTROL.";

const brandTarget = document.getElementById("brand");
const bodyTarget = document.getElementById("body-paragraph");
const expectTarget = document.getElementById("expect-line");
const demandTarget = document.getElementById("demand-line");

let brandIndex = 0;
let bodyIndex = 0;

const brandSpeed = 130;
const bodySpeed = 15;
const taglineSpeed = 130;

function typeBrand() {
  if (brandIndex <= brandText.length) {
    brandTarget.innerHTML = brandText.substring(0, brandIndex) + '<span class="cursor" id="brand-cursor">█</span>';
    brandIndex++;
    setTimeout(typeBrand, brandSpeed);
  } else {
    brandTarget.innerHTML = brandText + '<span class="cursor" id="brand-cursor">█</span>';
    setTimeout(typeBody, 250);
  }
}

function typeBody() {
  if (bodyIndex <= bodyText.length) {
    bodyTarget.innerHTML = bodyText.substring(0, bodyIndex);
    bodyIndex++;
    setTimeout(typeBody, bodySpeed);
  }
}

function removeBrandCursor() {
  const cursor = document.getElementById("brand-cursor");
  if (cursor) {
    cursor.remove();
  }
}

function startExpect() {
  removeBrandCursor();

  let i = 0;

  function type() {
    if (i <= expectText.length) {
      const current = expectText.substring(0, i).replace("EXPECT", '<span class="red">EXPECT</span>');
      expectTarget.innerHTML = current + '<span class="cursor">█</span>';
      i++;
      setTimeout(type, taglineSpeed);
    } else {
      expectTarget.innerHTML = expectText.replace("EXPECT", '<span class="red">EXPECT</span>');
    }
  }

  type();
}

function startDemand() {
  let i = 0;

  function type() {
    if (i <= demandText.length) {
      const current = demandText.substring(0, i).replace("DEMAND", '<span class="red">DEMAND</span>');
      demandTarget.innerHTML = current + '<span class="cursor">█</span>';
      i++;
      setTimeout(type, taglineSpeed);
    } else {
      demandTarget.innerHTML = demandText.replace("DEMAND", '<span class="red">DEMAND</span>');
    }
  }

  type();
}

window.onload = function() {
  typeBrand();

  setTimeout(startExpect, 10000);
  setTimeout(startDemand, 13000);
};
</script>

</body>
</html>
