<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannon Kinetics | Company</title>

<style>
body {
    margin: 0;
    background-color: #000;
    color: #fff;
    font-family: "Courier New", Courier, monospace;
    overflow-x: hidden;
}

.container {
    padding: 40px 20px;
    max-width: 900px;
    margin: 0 auto;
}

h1 {
    color: #ff0000;
    font-size: 28px;
    margin-bottom: 30px;
}

.type-line {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 20px;
    white-space: pre-wrap;
}

.cursor {
    display: inline-block;
    width: 10px;
    background-color: #ff0000;
    margin-left: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}

.nav {
    position: fixed;
    top: 20px;
    right: 20px;
}

.nav a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
}

.nav a:hover {
    color: #ff0000;
}
</style>
</head>

<body>

<div class="nav">
    <a href="index.html">HOME</a>
    <a href="company.html">COMPANY</a>
    <a href="contact.html">INQUIRIES</a>
</div>

<div class="container">
    <h1>CANNON KINETICS</h1>

    <div id="text"></div>
</div>

<script>
const lines = [
"We develop firearm components focused on modularity and integrated management of support gear and controls.",
"Our designs are shaped by the demands of serious shooters, law enforcement, and military personnel in the field — where precision, control, and reliability are required.",
"",
"Form follows function.",
"Demand control."
];

let index = 0;
let charIndex = 0;
const speed = 25;

function typeLine() {
    if (index >= lines.length) {
        document.getElementById("text").innerHTML += '<span class="cursor"></span>';
        return;
    }

    const currentLine = lines[index];
    const container = document.getElementById("text");

    if (charIndex < currentLine.length) {
        if (!container.lastChild || container.lastChild.className !== "type-line") {
            const newLine = document.createElement("div");
            newLine.className = "type-line";
            container.appendChild(newLine);
        }

        container.lastChild.textContent += currentLine.charAt(charIndex);
        charIndex++;
        setTimeout(typeLine, speed);
    } else {
        charIndex = 0;
        index++;
        setTimeout(typeLine, 400);
    }
}

typeLine();
</script>

</body>
</html>
