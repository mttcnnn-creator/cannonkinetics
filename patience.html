<!DOCTYPE html>
<html>
<head>

<style>

  background: #000;
  color: #fff;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

.container {
  max-width: 600px;
  width: 100%;
}

h1 {
  font-size: 2.4em;
  letter-spacing: 4px;
  margin-bottom: 20px;
  color: #ff0000;
}

.email-link {
  font-size: 1.3em;
  letter-spacing: 2px;
  color: #888;
  text-decoration: none;
  display: inline-block;
  margin-top: 5px;
}

.email-link:hover {
  color: #fff;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 700px) {
  h1 {
    font-size: 1.9em;
    letter-spacing: 2px;
  }

  .email-link {
    font-size: 1.05em;
    letter-spacing: 1px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>PRE-ORDER</h1>

  <a class="email-link" href="mailto:control@cannonkinetics.com">
