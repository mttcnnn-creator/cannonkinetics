<!DOCTYPE html>
<html>
<head>
<title>CONTACT US FOR MORE INFORMATION</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
background: #000;
color: #fff;
font-family: Arial, sans-serif;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
text-align: center;
padding: 20px;
box-sizing: border-box;
overflow-x: hidden;
}

.container {
max-width: 600px;
width: 100%;
}

/* LOGO */
.logo {
width: 225px;
max-width: 75%;
margin-bottom: 25px;
filter: invert(1) brightness(2);
}

/* DESKTOP TITLE REDUCED ~25% */
h1 {
font-size: 1.8em;
letter-spacing: 4px;
margin-bottom: 20px;
color: #ff0000;
opacity: 0;
transform: scale(2.4);
animation: stampIn 0.28s cubic-bezier(.2, 1.4, .4, 1) forwards;
white-space: nowrap;
max-width: 100%;
overflow: hidden;
}

/* EMAIL */
.email-link {
font-size: 1.625em;
letter-spacing: 0px;
color: #fff;
text-decoration: underline;
display: inline-block;
margin-top: 5px;
font-family: "Courier New", Courier, monospace;
font-weight: normal;
min-height: 1.5em;
}

.email-link:hover {
color: #ff0000;
}

.cursor {
color: #ff0000;
font-weight: bold;
animation: blink 0.8s steps(1) infinite;
}

/* BOTTOM NAV LINKS */
.bottom-links {
position: fixed;
bottom: 25px;
left: 50%;
transform: translateX(-50%);
display: flex;
justify-content: center;
align-items: center;
gap: 95px;
opacity: 0;
transition: opacity 0.8s ease;
z-index: 100;
white-space: nowrap;
}

.bottom-links.show {
opacity: 1;
}

.bottom-links a {
color: #fff;
text-decoration: none;
font-family: Arial, sans-serif;
font-size: 0.8em;
letter-spacing: 5px;
font-weight: bold;
}

.bottom-links a:hover {
color: #ccc;
}

@keyframes stampIn {
0% {
opacity: 0;
transform: scale(2.4);
}

70% {
opacity: 1;
transform: scale(0.92);
}

100% {
opacity: 1;
transform: scale(1);
}
}

@keyframes blink {
50% {
opacity: 0;
}
}

/* MOBILE */
@media (max-width: 700px) {

/* TITLE REDUCED ~50% */
h1 {
font-size: 0.95em;
letter-spacing: 2px;
white-space: nowrap;
max-width: 100%;
overflow: hidden;
}

/* EMAIL */
.email-link {
font-size: 1.3125em;
letter-spacing: 0px;
}

.logo {
width: 160px;
}

/* MATCH INDEX/COMPANY MOBILE LINK SETTINGS */
.bottom-links {
bottom: 18px;
gap: 52px;
}

.bottom-links a {
font-size: 0.5em;
font-weight: normal;
letter-spacing: 3px;
}
}
</style>
</head>

<body>

<div class="container">

<img src="Cannon (9).png" class="logo">

<h1>CONTACT US FOR MORE INFORMATION</h1>

<a class="email-link" href="mailto:control@cannonkinetics.com" id="email-link"></a>

</div>

<!-- NEW NAVIGATION -->
<div class="bottom-links" id="bottom-links">
<a href="index.html">HOME</a>
<a href="company.html">COMPANY INFO</a>
</div>

<script>
const emailText = "control@cannonkinetics.com";
const emailLink = document.getElementById("email-link");
const bottomLinks = document.getElementById("bottom-links");

let emailIndex = 0;

const emailSpeed = 75;

function typeEmail() {
if (emailIndex <= emailText.length) {
emailLink.innerHTML = emailText.substring(0, emailIndex) + '<span class="cursor">█</span>';
emailIndex++;
setTimeout(typeEmail, emailSpeed);
} else {
emailLink.innerHTML = emailText + '<span class="cursor">█</span>';

setTimeout(() => {
bottomLinks.classList.add("show");
}, 1000);
}
}

window.onload = function() {
setTimeout(typeEmail, 450);
};
</script>

</body>
</html>
