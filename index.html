<script>
const taglinePartOne = "EXPECT Precision.";
const taglinePartTwo = " DEMAND Control.";
const companyText = "COMPANY";

const tagline = document.getElementById("tagline");
const companyLink = document.getElementById("company-link");
const button = document.getElementById("coming-soon-button");

let partOneIndex = 0;
let partTwoIndex = 0;
let companyIndex = 0;

const typeSpeed = 65;
const startDelay = 1000;
const secondLineDelay = 500;

function formatTagline(text) {
return text
.replace("EXPECT", '<span class="red">EXPECT</span>')
.replace("DEMAND", '<span class="red">DEMAND</span>');
}

function typePartOne() {
if (partOneIndex <= taglinePartOne.length) {
const current = taglinePartOne.substring(0, partOneIndex);
tagline.innerHTML = formatTagline(current) + '<span class="cursor">█</span>';
partOneIndex++;
setTimeout(typePartOne, typeSpeed);
} else {
tagline.innerHTML = formatTagline(taglinePartOne) + '<span class="cursor">█</span>';
setTimeout(typePartTwo, secondLineDelay);
}
}

function typePartTwo() {
if (partTwoIndex <= taglinePartTwo.length) {
const current = taglinePartOne + taglinePartTwo.substring(0, partTwoIndex);
tagline.innerHTML = formatTagline(current) + '<span class="cursor">█</span>';
partTwoIndex++;
setTimeout(typePartTwo, typeSpeed);
} else {
tagline.innerHTML = formatTagline(taglinePartOne + taglinePartTwo);
setTimeout(typeCompany, 400);
}
}

function typeCompany() {
if (companyIndex <= companyText.length) {
const current = companyText.substring(0, companyIndex);
companyLink.innerHTML = current + '<span class="company-cursor">█</span>';
companyIndex++;
setTimeout(typeCompany, typeSpeed);
} else {
companyLink.innerHTML = companyText + '<span class="company-cursor">█</span>';
setTimeout(() => button.classList.add("show"), 1200);
}
}

document.addEventListener("DOMContentLoaded", () => {
setTimeout(typePartOne, startDelay);
});
</script>
