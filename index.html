<!DOCTYPE html>
<html>
<head>
<title>Cannon Kinetics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #050505;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px 80px;
  box-sizing: border-box;
  position: relative;
  z-index: 10;
}

.logo {
  width: 300px;
  max-width: 80%;
  margin-bottom: 30px;
  filter: invert(1) brightness(2);
}

h1 {
  margin: 0;
  font-size: 3.8em;
  letter-spacing: 12px;
  font-weight: 800;
}

.tagline {
  margin-top: 25px;
  font-size: 1.4em;
  letter-spacing: 4px;
  color: #b8b8b8;
  font-family: "Courier New", Courier, monospace;
  min-height: 1.6em;
}

.red {
  color: #ff0000;
  transition: color 0.2s ease;
}

.red:hover {
  color: #ffffff;
}

.cursor {
  color: #ff0000;
  font-weight: bold;
  animation: blink 0.8s steps(1) infinite;
}

.button {
  display: inline-block;
  margin-top: 50px;
  padding: 16px 55px;
  border: 2px solid #fff;
  text-decoration: none;
  color: #fff;
  font-size: 1.2em;
  letter-spacing: 5px;
  font-weight: bold;
}

.company-link {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1em;
  letter-spacing: 5px;
  font-weight: bold;
  color: #cc0000;
  text-decoration: none;
  white-space: nowrap;
  z-index: 100;
}

.company-cursor {
  color: #ffffff;
  font-weight: bold;
  margin-left: 2px;
  animation: blink 0.9s steps(1) infinite;
}

.company-link:hover {
  color: #ff0000;
}

.bullet-hole {
  position: fixed;
  width: 78px;
  opacity: 0;
  pointer-events: none;
  z-index: 999999;
  transform: translate(-50%, -50%) scale(0.4) rotate(var(--rotation));
  animation: impact 0.18s ease-out forwards;
}

@keyframes impact {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.3) rotate(var(--rotation));
  }

  100% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1) rotate(var(--rotation));
  }
}

@keyframes blink {
  50% {
    opacity: 0;
  }
}

/* Mobile */
@media (max-width: 700px) {
  .container {
    padding: 30px 16px 90px;
  }

  h1 {
    font-size: 2em;
    letter-spacing: 5px;
    line-height: 1.2;
  }

  .tagline {
    font-size: 0.85em;
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .logo {
    width: 210px;
    margin-bottom: 25px;
  }

  .button {
    font-size: 0.95em;
    padding: 12px 28px;
    letter-spacing: 3px;
    margin-top: 42px;
  }

  .company-link {
    font-size: 0.9em;
    letter-spacing: 3px;
    bottom: 24px;
  }

  .bullet-hole {
    width: 58px;
  }
}
</style>
</head>

<body>

<div class="container">

  <img src="Cannon (9).png" class="logo">

  <h1>CANNON KINETICS</h1>

  <div class="tagline" id="tagline"></div>

  <a href="patience.html" class="button">COMING SOON</a>

</div>

<a href="company.html" class="company-link" id="company-link"></a>

<script>
const taglineText = "EXPECT Precision. DEMAND Control.";
const companyText = "COMPANY";

const tagline = document.getElementById("tagline");
const companyLink = document.getElementById("company-link");

let taglineIndex = 0;
let companyIndex = 0;

const typeSpeed = 130;

/* 400 RPM = 150ms between impacts */
const cyclicRateDelay = 150;

const bulletCount = 7;

function formatTagline(value) {
  return value
    .replace("EXPECT", '<span class="red">EXPECT</span>')
    .replace("DEMAND", '<span class="red">DEMAND</span>');
}

function typeTagline() {
  if (taglineIndex <= taglineText.length) {
    const currentText = taglineText.substring(0, taglineIndex);
    tagline.innerHTML = formatTagline(currentText) + '<span class="cursor">|</span>';
    taglineIndex++;
    setTimeout(typeTagline, typeSpeed);
  } else {
    tagline.innerHTML = formatTagline(taglineText);
    setTimeout(typeCompany, 400);
  }
}

function typeCompany() {
  if (companyIndex <= companyText.length) {
    const currentCompany = companyText.substring(0, companyIndex);
    companyLink.innerHTML = currentCompany + '<span class="company-cursor">█</span>';
    companyIndex++;
    setTimeout(typeCompany, typeSpeed);
  } else {
    companyLink.innerHTML = companyText + '<span class="company-cursor">█</span>';

    /* Anticipation pause after COMPANY finishes before burst starts */
    setTimeout(startBulletBurst, 1200);
  }
}

function startBulletBurst() {
  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight;

  const startX = screenWidth * 0.88;
  const endX = screenWidth * 0.12;
  const centerY = screenHeight * 0.34;

  for (let n = 0; n < bulletCount; n++) {
    setTimeout(() => {
      const bullet = document.createElement("img");
      bullet.src = "bullet-hole.png";
      bullet.className = "bullet-hole";

      const progress = n / (bulletCount - 1);
      const x = startX + (endX - startX) * progress;
      const randomY = centerY + (Math.random() * 180 - 90);
      const rotation = Math.floor(Math.random() * 90 - 45) + "deg";

      bullet.style.left = x + "px";
      bullet.style.top = randomY + "px";
      bullet.style.setProperty("--rotation", rotation);

      document.body.appendChild(bullet);
    }, n * cyclicRateDelay);
  }
}

window.onload = typeTagline;
</script>

</body>
</html>
