<!DOCTYPE html>
<html>
<head>
<title>Cannon Kinetics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
background: #050505;
color: #fff;
font-family: "Courier New", Courier, monospace;
text-align: center;
position: relative;
}

.container {
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 40px 20px 80px;
box-sizing: border-box;
}

.logo {
width: 300px;
max-width: 80%;
margin-bottom: 30px;
filter: invert(1) brightness(2);
}

h1 {
margin: 0;
font-size: 3.8em;
letter-spacing: 12px;
font-weight: 800;
font-family: Arial, sans-serif;
}

.tagline {
margin-top: 25px;
font-size: 1.4em;
letter-spacing: 4px;
color: #b8b8b8;
min-height: 1.6em;
}

.red {
color: #ff0000;
}

.cursor {
display: inline-block;
width: 0.6em;
height: 1em;
background: #ff0000;
vertical-align: -0.15em;
animation: blink 0.8s steps(1) infinite;
}

.company-cursor {
display: inline-block;
width: 0.6em;
height: 1em;
background: #ffffff;
vertical-align: -0.15em;
animation: blink 0.8s steps(1) infinite;
}

.button {
display: inline-block;
margin-top: 50px;
padding: 16px 55px;
border: 2px solid #fff;
text-decoration: none;
color: #fff;
font-size: 1.2em;
letter-spacing: 5px;
font-weight: bold;
}

.company-link {
position: absolute;
bottom: 25px;
left: 50%;
transform: translateX(-50%);
font-size: 1em;
letter-spacing: 5px;
font-weight: bold;
color: #cc0000;
text-decoration: none;
white-space: nowrap;
min-height: 1.2em;
}

.company-link:hover {
color: #ff0000;
}

@keyframes blink {
50% {
opacity: 0;
}
}

@media (max-width: 700px) {
.container {
padding: 30px 16px 90px;
}

h1 {
font-size: 2em;
letter-spacing: 5px;
line-height: 1.2;
}

.tagline {
font-size: 0.95em;
letter-spacing: 1.5px;
line-height: 1.5;
}

.logo {
width: 210px;
margin-bottom: 25px;
}

.button {
font-size: 0.95em;
padding: 12px 28px;
letter-spacing: 3px;
margin-top: 42px;
}

.company-link {
font-size: 0.9em;
letter-spacing: 3px;
bottom: 24px;
}
}
</style>
</head>

<body>

<div class="container">

<img src="Cannon (9).png" class="logo">

<h1>CANNON KINETICS</h1>

<div class="tagline" id="tagline"></div>

<a href="patience.html" class="button">COMING SOON</a>

</div>

<a href="company.html" class="company-link" id="company-link"></a>

<script>
const taglineText = "EXPECT Precision. DEMAND Control.";
const companyText = "COMPANY";

const taglineTarget = document.getElementById("tagline");
const companyTarget = document.getElementById("company-link");

const speed = 130;

let taglineIndex = 0;
let companyIndex = 0;

function formatTagline(value) {
return value
.replace("EXPECT", '<span class="red">EXPECT</span>')
.replace("DEMAND", '<span class="red">DEMAND</span>');
}

function typeTagline() {
if (taglineIndex <= taglineText.length) {
const currentText = taglineText.substring(0, taglineIndex);
taglineTarget.innerHTML = formatTagline(currentText) + '<span class="cursor"></span>';
taglineIndex++;
setTimeout(typeTagline, speed);
} else {
taglineTarget.innerHTML = formatTagline(taglineText);
setTimeout(typeCompany, 500);
}
}

function typeCompany() {
if (companyIndex <= companyText.length) {
companyTarget.innerHTML = companyText.substring(0, companyIndex) + '<span class="company-cursor"></span>';
companyIndex++;
setTimeout(typeCompany, speed);
} else {
companyTarget.innerHTML = companyText + '<span class="company-cursor"></span>';
}
}

window.onload = typeTagline;
</script>

</body>
</html>
