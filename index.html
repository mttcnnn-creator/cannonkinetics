<!DOCTYPE html>
<html>
<head>
<title>Cannon Kinetics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: #ffffff;
  text-align: center;
}

.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

.logo {
  width: 300px;
  max-width: 80%;
  margin-bottom: 30px;

  /* Makes your dark logo show as white */
  filter: invert(1) brightness(2);
}

h1 {
  margin: 0;
  font-size: 3.8em;
  letter-spacing: 12px;
  font-weight: 800;
}

.tagline {
  margin-top: 25px;
  font-size: 1.4em;
  letter-spacing: 4px;
  color: #b8b8b8;
}

.button {
  display: inline-block;
  margin-top: 50px;
  padding: 16px 55px;
  border: 2px solid #ffffff;
  text-decoration: none;
  color: #ffffff;
  font-size: 1.2em;
  letter-spacing: 5px;
  font-weight: bold;
}

/* Mobile adjustments */
@media (max-width: 700px) {
  h1 {
    font-size: 2.2em;
    letter-spacing: 6px;
  }

  .tagline {
    font-size: 1em;
    letter-spacing: 2px;
  }

  .logo {
    width: 220px;
  }

  .button {
    font-size: 1em;
    padding: 12px 30px;
    letter-spacing: 3px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- Your uploaded logo -->
  <img src="Cannon (9).png" class="logo">

  <h1>CANNON KINETICS</h1>

  <div class="tagline">
    Expect Precision. Demand Control.
  </div>

 <a href="patience.html" class="button">COMING SOON</a>

</div>

</body>
</html>
