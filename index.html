<!DOCTYPE html>
<html>
<head>
<title>Cannon Kinetics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #050505;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  position: relative;
}

.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

.logo {
  width: 300px;
  max-width: 80%;
  margin-bottom: 30px;
  filter: invert(1) brightness(2);
}

h1 {
  margin: 0;
  font-size: 3.8em;
  letter-spacing: 12px;
  font-weight: 800;
}

.tagline {
  margin-top: 25px;
  font-size: 1.4em;
  letter-spacing: 4px;
  color: #b8b8b8;

  /* MATCH COMPANY PAGE FONT */
  font-family: "Courier New", Courier, monospace;
}

/* HOVER EFFECT */
.hover-red {
  transition: color 0.2s ease;
}

.hover-red:hover {
  color: #ff0000;
}

.button {
  display: inline-block;
  margin-top: 50px;
  padding: 16px 55px;
  border: 2px solid #fff;
  text-decoration: none;
  color: #fff;
  font-size: 1.2em;
  letter-spacing: 5px;
  font-weight: bold;
}

.company-link {
  position: absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1em;
  letter-spacing: 5px;
  font-weight: bold;
  color: #cc0000;
  text-decoration: none;
}

.company-link:hover {
  color: #ff0000;
}

/* Mobile */
@media (max-width: 700px) {
  h1 {
    font-size: 2.2em;
    letter-spacing: 6px;
  }

  .tagline {
    font-size: 1em;
    letter-spacing: 2px;
  }

  .logo {
    width: 220px;
  }

  .button {
    font-size: 1em;
    padding: 12px 30px;
    letter-spacing: 3px;
  }

  .company-link {
    letter-spacing: 3px;
  }
}
</style>
</head>

<body>

<div class="container">

  <img src="Cannon (9).png" class="logo">

  <h1>CANNON KINETICS</h1>

  <div class="tagline">
    <span class="hover-red">EXPECT</span> Precision.
    <span class="hover-red">DEMAND</span> Control.
  </div>

  <a href="patience.html" class="button">COMING SOON</a>

</div>

<a href="company.html" class="company-link">COMPANY</a>

</body>
</html>
